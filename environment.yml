name: pantanal
channels:
  - defaults
dependencies:
  - python=3.10
  - pip
  - pip:
    # Perch 2.0  (per https://github.com/google-research/perch-hoplite#installation)
    - perch-hoplite[tf-cuda] @ git+https://github.com/google-research/perch-hoplite.git
    - nvidia-cudnn-cu12>=9.3.0        # override PyTorch's 9.1, TF 2.20 needs >=9.3
    # PyTorch (for classifier training)
    - torch>=2.5.0
    - torchvision
    - --extra-index-url https://download.pytorch.org/whl/cu121
    # Audio
    - librosa>=0.10.0
    - soundfile>=0.12.0
    # Data / ML
    - numpy>=1.24
    - pandas>=2.0
    - h5py>=3.9
    - scikit-learn>=1.3
    - hdbscan>=0.8.33
    - umap-learn>=0.5
    - datasets<=3.6.0
    - transformers>=4.40
    # Config / logging
    - pyyaml>=6.0
    - tqdm>=4.65
    - wandb>=0.15
