data:
  train_csv: data/train.csv
  soundscape_labels_csv: data/train_soundscapes_labels.csv
  taxonomy_csv: data/taxonomy.csv
  train_audio_dir: data/train_audio
  soundscape_dir: data/train_soundscapes
  distill_manifest_csv: data/distill_manifest.csv
  distill_audio_dir: data/distill_audio
  sample_rate: 32000
  segment_duration: 5.0
  segment_overlap: 0.0

outputs:
  base_dir: outputs
  segments_csv: outputs/segments.csv
  distill_segments_csv: outputs/distill_segments.csv
  embeddings_h5: outputs/embeddings/embeddings.h5
  distill_embeddings_h5: outputs/embeddings/distill_embeddings.h5
  prototypes_dir: outputs/prototypes
  features_h5: outputs/features/features.h5
  checkpoints_dir: outputs/checkpoints
  pseudo_labels_dir: outputs/pseudo_labels
  nmf_dir: outputs/nmf_per_class
  nmf_global_dir: outputs/nmf_global
  logs_dir: outputs/logs

stage0:
  energy_threshold: 0.001
  min_active_fraction: 0.1
  skip_silence_filter: false

stage1:
  model_name: perch_v2
  batch_size: 64
  num_workers: 8
  store_spatial: true
  store_logits: true
  top_k_logits: 200
  logits_dtype: float16

supcon:
  proj_dim: 256
  temperature: 0.07
  lr: 1.0e-3
  weight_decay: 1.0e-4
  epochs: 80
  batch_size: 512
  seed: 42
  wandb_project: pantanal-monitoring

stage2:
  global:
    umap_dim: 64
    subsample_n: 200000
    min_cluster_size: 50
    min_samples: 10
  species:
    pca_dim: 64
    max_components: 10
    min_samples_per_component: 20

stage3:
  top_k_logits: 200
  assignment_mode: soft
  similarity_metric: cosine    # "cosine" (default, better for Perch) or "euclidean"
  temperature: 0.1             # softmax temperature — lower = sharper assignment

probe:
  # Prototypical probing head (Bird-MAE paper, arXiv:2504.12880).
  # Reads spatial embeddings (N, L, D) from student_embeddings.h5,
  # trains J learned prototypes per species end-to-end with BCE + orthogonality.
  prototypes_per_class: 10
  lr: 1.0e-3
  weight_decay: 1.0e-4
  ortho_weight: 0.1
  batch_size: 256
  epochs: 30
  num_workers: 0
  preload: true                # hold spatial_embeddings in RAM (~11 GB) during training
  fold: 0

stage4:
  # Regularization tuned for the no-Perch-logits feature set (3538D).
  # Without logits, the model overfits fast — best epoch was 2/50 on the
  # previous run. Shrink capacity, raise dropout + weight decay, add early stop.
  hidden_dims: [256, 128]
  dropout: 0.5
  lr: 1.0e-3
  weight_decay: 1.0e-3
  max_epochs: 30
  early_stop_patience: 7
  mixup_alpha: 0.2
  batch_size: 512
  n_folds: 5
  loss: asl
  focal_alpha: 0.25
  focal_gamma: 2.0
  asl_gamma_pos: 0.0
  asl_gamma_neg: 4.0
  asl_clip: 0.05
  wandb_project: pantanal-monitoring

stage1d:
  backbone: DBD-research-group/EfficientNet-B1-BirdSet-XCL
  embed_dim: 1536
  epochs: 60
  batch_size: 256
  num_workers: 4
  prefetch_factor: 2
  backbone_lr: 2.0e-4      # scaled 4x for batch_size=256
  head_lr: 4.0e-3          # scaled 4x for batch_size=256
  weight_decay: 1.0e-4
  lambda_global: 1.0
  lambda_spatial: 0.5      # reduce spatial weight — harder to match, drags global down
  lambda_logit: 0.15
  target_cosine_sim: 0.93  # log when this threshold is reached
  wandb_project: pantanal-monitoring

student_mel:
  n_mels: 128
  hop_ms: 10               # hop length in milliseconds (matches Perch frontend)
  win_ms: 25               # window length in milliseconds
  fmin: 60.0
  fmax: 16000.0

stage4b:
  max_rounds: 3
  initial_threshold: 0.9
  self_train_threshold: 0.85
  pseudo_weight: 0.5
  use_perch_logits_round1: true

stage_nmf_global:
  # NMFk on a stratified sample of student embeddings → a global motif
  # dictionary W (D, k). Downstream features are H = W_pinv @ embedding.
  # Hypothesis: embeddings already organize by species, so motif activations
  # should reflect sub-call structure rather than generic spectrogram primitives.
  embeddings: student            # "student" or "perch" — fit where we'll infer
  per_species_sample: 150        # stratified sample; 234 × 150 ≈ 35k segments
  k_min: 32
  k_max: 256
  k_step: 32                     # tests k ∈ {32, 64, 96, 128, 160, 192, 224, 256}
  n_runs_per_k: 5                # one fit per sample (not per species) so we can afford more runs
  nmf_max_iter: 600
  perturb_std: 0.01
  algo: hals
  silhouette_min: 0.5            # NMFk.jl default cutoff
  strict: true                   # if none pass, keep max-robustness k (tagged as degraded)
  project_batch_size: 4096       # embedding-space projection is tiny; bigger batches fine
  seed: 42
